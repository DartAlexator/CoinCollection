<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin collection</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="sticky-header">
        <!-- Скрипт берёт ID отсюда -->
        <h1>Альбом<br><small id="albumId">A001-01-GD-BK</small></h1>
        <h2><span class="emoji">🇪🇺</span> Юбилейные 2 евро<br><small>(часть 1)</small></h2>
    </div>

    <div id="buttonsContainer"></div>

    <a href="https://dartalexator.github.io/CoinCollection/index.html" class="btn-back">
        <span>ВЕРНУТЬСЯ К СПИСКУ АЛЬБОМОВ</span>
    </a>
    
    <div class="footer">Dart_Alexator Coin Collection Library ©</div>

    <script>
        // Путь к ОБЩЕМУ файлу со всеми кнопками всех альбомов
        const csvUrl = 'album_buttons.csv'; 

        async function loadAlbumButtons() {
            try {
                const currentID = document.getElementById('albumId').innerText.trim();
                const resp = await fetch(csvUrl + '?t=' + Date.now());
                const text = await resp.text();
                
                // Очистка от символов переноса Excel и разбивка на строки
                const rows = text.replace(/\r/g, "").split('\n').filter(row => row.trim() !== '');
                const container = document.getElementById('buttonsContainer');

                rows.forEach((row, index) => {
                    if (index === 0) return; // Пропускаем заголовок таблицы
                    const cols = row.split(';');
                    
                    // Проверяем, относится ли эта строка к текущему альбому
                    if (cols[0].trim() === currentID) {
                        // Проверяем наличие колонки перед тем как делать .trim()
                        const iconData  = cols[1] ? cols[1].trim() : "";
                        const name      = cols[2] ? cols[2].trim() : "Без названия";
                        const excelLink = cols[3] ? cols[3].trim() : "";
                        const folderLink = cols[4] ? cols[4].trim() : "";

                        // Если нет ссылки на Excel — вообще не рисуем этот ряд
                        if (excelLink === "") return;

                        // 1. Сначала определяем, что рисовать в блоке иконки
                        let iconHtml = ''; // По умолчанию пусто

                        if (iconData && iconData.trim() !== "") {
                            if (iconData.startsWith('http')) {
                                // Если это ссылка — рисуем картинку
                                iconHtml = `<img src="${iconData}" width="28" style="margin-right:12px; border: 1px solid #eee; vertical-align: middle;">`;
                            } else {
                                // Если это текст/эмодзи — рисуем как эмодзи
                                iconHtml = `<span class="emoji">${iconData}</span>`;
                            }
                        }

                        // 2. Генерируем финальную верстку ряда
                        const rowDiv = document.createElement('div');
                        rowDiv.className = 'btn-row';

                        rowDiv.innerHTML = `
                            <a href="${excelLink}" class="btn">
                                ${iconHtml}
                                <span>${name}</span>
                                <div style="width:32px;"></div> <!-- Пустышка для центровки текста -->
                            </a>
                            <a href="${folderLink}" class="btn-folder" title="Открыть папку">📂</a>
                        `;
                        container.appendChild(rowDiv);
                    }
                });
            } catch (err) {
                console.error("Ошибка загрузки кнопок:", err);
            }
        }

        loadAlbumButtons();
    </script>
</body>
</html>
