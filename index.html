<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart_Alexator Coin Collection</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 20px 0 20px;
            margin: 0; 
        }
        h1 { text-align: center; color: #1c1e21; font-size: 20px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { color: #65676b; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; }
        
        #searchBar {
            width: 100%; 
            max-width: 360px; 
            padding: 12px 15px; 
            margin-bottom: 10px; /* Уменьшили отступ снизу */
            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box;
        }
        #searchBar:focus { border-color: #007bff; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        
        .card { 
            display: flex; align-items: center; padding: 15px; 
            background: white; color: #1c1e21; text-decoration: none; 
            border-radius: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0; transition: 0.1s;
        }
        .card:active { transform: scale(0.98); background: #fafafa; }
        .icon { font-size: 24px; margin-right: 15px; }
        .info { display: flex; flex-direction: column; }
        .title { font-weight: bold; font-size: 15px; line-height: 1.2; }
        .code { font-size: 13px; color: #007bff; margin-top: 4px; font-family: monospace; }
        
        .hidden { display: none; }
        #loader { color: #888; font-size: 14px; margin-top: 50px; }
        
        .sticky-header {
            position: sticky;
            top: 0;
            background: #f0f2f5; /* Должен совпадать с фоном body */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000; /* Чтобы быть выше карточек */
            padding-top: 15px; 
            box-shadow: 0 10px 10px -10px rgba(0,0,0,0.1); 
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>Dart_Alexator</h1>
    <div class="subtitle">Coin Collection Library</div>

    <div class="sticky-header">
        <input type="text" id="searchBar" placeholder="Поиск..." onkeyup="filterAlbums()">
        <div style="margin-bottom: 20px; font-size: 14px; color: #1c1e21; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="deepSearch" style="width: 18px; height: 18px; cursor: pointer;">
            <label for="deepSearch" style="cursor: pointer; user-select: none;">Включить поиск по ключевым словам</label>
        </div>
    </div>

    <div id="loader">Загрузка данных из CSV...</div>
    <div class="grid" id="albumGrid"></div>

    <script>
        const csvUrl = 'Info/Hardcoded_album_links/albums_ID.csv';

        const iconMap = {
            '00': '📔',	//Virtual
            'BK': '📓',	//Black
            'WH': '📔',	//White
            'RD': '📕', 	//Red
            'GR': '📗', 	//Green
            'GY': '📓',	//Grey
            'BL': '📘', 	//Blue
            'LB': '📘', 	//Light Blue
            'DB': '📘', 	//Dark Blue
            'BU': '📕', 	//Burgundy
            'BN': '📙', 	//Brown
            'DN': '📙', 	//Dark Brown
            'LN': '📒' 	//Light Brown
        };

        async function init() {
            try {
                const resp = await fetch(csvUrl + '?t=' + Date.now());                
                const text = await resp.text();
                
                // Очистка от \r и разбивка на строки
                const rows = text.replace(/\r/g, "").split('\n').filter(row => row.trim() !== '');
                
                const grid = document.getElementById('albumGrid');
                const loader = document.getElementById('loader');
                if(loader) loader.remove();

                // Начинаем с i=1, чтобы пропустить заголовок таблицы
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(';');
                    if (cols.length < 4) continue;

                    const idCode = cols[1].trim().replace(/\r/g, "");   // Album ID
                    const titleRu = cols[3].trim().replace(/\r/g, "");  // Album Content (ru)
                    const autoLink = `https://dartalexator.github.io{idCode}.html`;
                    
                    const keywords = cols[4] ? cols[4].trim().replace(/\r/g, "") : "";
                    
                    // Берем последние 2 буквы ID для определения цвета
                    const colorSuffix = idCode.split('-').pop();
                    const icon = iconMap[colorSuffix] || '📘';

                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = autoLink;
                    card.setAttribute('data-keywords', keywords); 

                    card.innerHTML = `
                        <div class="icon">${icon}</div>
                        <div class="info">
                            <span class="title">${titleRu}</span>
                            <span class="code">${idCode}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            } catch (err) {
                document.getElementById('loader').innerText = "Ошибка доступа к CSV файлу.";
                console.error(err);
            }
        }

        function filterAlbums() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let isDeep = document.getElementById('deepSearch').checked; // Проверяем галочку
            let cards = document.getElementsByClassName('card');

            for (let card of cards) {
                // Текст названия и ID (всегда виден)
                let mainText = card.querySelector('.info').textContent.toLowerCase();
                // Ключевые слова (скрыты в атрибуте, который мы добавим при загрузке)
                let keywords = card.getAttribute('data-keywords') || "";
                
                let found = mainText.includes(input);
                
                // Если включен "глубокий поиск", проверяем и ключевые слова
                if (isDeep && keywords.toLowerCase().includes(input)) {
                    found = true;
                }

                card.classList.toggle('hidden', !found);
            }
        }
        
        document.getElementById('deepSearch').addEventListener('change', filterAlbums);

        init();
    </script>
</body>
</html>
