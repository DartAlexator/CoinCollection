<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монетная библиотека</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #1c1e21; text-align: center; font-size: 24px; margin-bottom: 5px; }
        
        /* Поле поиска */
        #searchBar {
            width: 100%;
            max-width: 360px;
            padding: 12px 15px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }
        #searchBar:focus { border-color: #007bff; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        
        /* Стили карточки */
        .card { 
            display: flex; align-items: center; padding: 15px; 
            background: white; color: #1c1e21; text-decoration: none; 
            border-radius: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        .icon { font-size: 24px; margin-right: 15px; }
        .info { display: flex; flex-direction: column; }
        .title { font-weight: bold; font-size: 16px; }
        .code { font-size: 12px; color: #007bff; font-family: monospace; }
        
        /* Скрытие при поиске */
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Монетная<br>библиотека</h1>

    <!-- Поле поиска -->
    <input type="text" id="searchBar" placeholder="Введите номер (например, 0007)..." onkeyup="filterAlbums()">

    <div class="grid" id="albumGrid">
        
        <!-- АЛЬБОМ 1 -->
        <a href="CoinCollection/Info/Hardcoded_links.html" class="card" data-name="0001">
            <div class="icon">📘</div>
            <div class="info">
                <span class="title">Альбом №1</span>
                <span class="code">A0001-OA-BL</span>
            </div>
        </a>

        <!-- АЛЬБОМ 7 -->
        <a href="CoinCollection/Info/Album7.html" class="card" data-name="0007">
            <div class="icon">📗</div>
            <div class="info">
                <span class="title">Альбом №7</span>
                <span class="code">A0007-OA-BL</span>
            </div>
        </a>

    </div>

    <script>
        function filterAlbums() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            
            for (let i = 0; i < cards.length; i++) {
                // Ищем совпадение либо в заголовке, либо в коде (data-name)
                let text = cards[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    cards[i].classList.remove('hidden');
                } else {
                    cards[i].classList.add('hidden');
                }
            }
        }
    </script>

</body>
</html>
