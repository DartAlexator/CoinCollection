<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart_Alexator Coin Collection</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 20px 0 20px;
            margin: 0; 
        }
        h1 { text-align: center; color: #1c1e21; font-size: 20px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { color: #65676b; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; }
        
        #searchBar {
            width: 100%; 
            max-width: 360px; 
            padding: 12px 15px; 
            margin-bottom: 10px;
            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box;
        }
        #searchBar:focus { border-color: #007bff; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; }
        
        .card { 
            display: flex; align-items: center; padding: 15px; 
            background: white; color: #1c1e21; text-decoration: none; 
            border-radius: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0; transition: 0.1s;
        }
        .card:active { transform: scale(0.98); background: #fafafa; }
        
        /* Стили для нашей новой векторной книги */
        .book-icon {
            width: 32px;
            height: 32px;
            margin-right: 15px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .book-icon svg {
            width: 100%;
            height: 100%;
            /* Мягкая цветная тень вместо серой */
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1));
            transition: transform 0.2s ease;
        }
        
        .book-icon:hover svg {
            transform: translateY(-2px); /* Книжка приподнимается при наведении */
        }

        .info { display: flex; flex-direction: column; }
        .title { font-weight: bold; font-size: 15px; line-height: 1.2; }
        .code { font-size: 13px; color: #007bff; margin-top: 4px; font-family: monospace; }
        
        .hidden { display: none; }
        #loader { color: #888; font-size: 14px; margin-top: 50px; }
        
        .sticky-header {
            position: sticky;
            top: 0;
            background: #f0f2f5; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000; 
            padding-top: 15px; 
            box-shadow: 0 10px 10px -10px rgba(0,0,0,0.1); 
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>Dart_Alexator</h1>
    <div class="subtitle">Coin Collection Library</div>

    <div class="sticky-header">
        <input type="text" id="searchBar" placeholder="Поиск..." onkeyup="filterAlbums()">
        <div style="margin-bottom: 20px; font-size: 14px; color: #1c1e21; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="deepSearch" style="width: 18px; height: 18px; cursor: pointer;" checked>
            <label for="deepSearch" style="cursor: pointer; user-select: none;">Включить поиск по ключевым словам</label>
        </div>
    </div>

    <div id="loader">Загрузка данных из CSV...</div>
    <div class="grid" id="albumGrid"></div>

    <script>
        const csvUrl = 'Info/Hardcoded_album_links/albums_ID.csv';
        const fldUrl = 'Info/Hardcoded_album_links/';
        
        if (!document.referrer.includes('Hardcoded_album_links')) {
            sessionStorage.removeItem('lastSearchText');
            sessionStorage.setItem('lastSearchDeep', 'true'); 
        }
        
        const colorMap = {
            '00': '#f8f9fa', // Virtual
            'BK': '#495057', // Black
            'WH': '#ffffff', // White
            'RD': '#ff6b6b', // Red 
            'GR': '#51cf66', // Green 
            'GY': '#adb5bd', // Grey
            'BL': '#339af0', // Blue
            'LB': '#a5d8ff', // Light Blue
            'DB': '#4c6ef5', // Dark Blue
            'BU': '#f06595', // Burgundy
            'BN': '#be4bdb', // Brown
            'DN': '#ff922b', // Dark Brown
            'LN': '#fcc419'  // Light Brown
        };

        function getBookSVG(hexColor) {
        const strokeColor = hexColor.toLowerCase() === '#ffffff' ? '#dee2e6' : 'rgba(0,0,0,0.1)';
        
        return `
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="3" width="16" height="18" rx="2" fill="${hexColor}" stroke="${strokeColor}" stroke-width="0.5"/>
                
                <path d="M4 3H7V21H4V3Z" fill="rgba(255,255,255,0.2)"/>
                
                <line x1="7" y1="3" x2="7" y2="21" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
                
                <line x1="10" y1="7" x2="16" y2="7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
                <line x1="10" y1="10" x2="14" y2="10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.8"/>
                
                <path d="M18 4V20" stroke="white" stroke-width="0.5" stroke-opacity="0.3"/>
            </svg>`;
    }

        async function init() {
            try {
                const resp = await fetch(csvUrl + '?t=' + Date.now());                
                const text = await resp.text();
                const rows = text.replace(/\r/g, "").split('\n').filter(row => row.trim() !== '');
                const grid = document.getElementById('albumGrid');
                const loader = document.getElementById('loader');
                if(loader) loader.remove();

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(';');
                    if (cols.length < 4) continue;

                    const idCode = cols[1].trim().replace(/\r/g, "");   
                    const titleRu = cols[3].trim().replace(/\r/g, "");  
                    const autoLink = fldUrl + idCode + '.html';
                    const keywords = cols[4] ? cols[4].trim().replace(/\r/g, "") : "";
                    
                    const colorSuffix = idCode.split('-').pop();
                    const albumHex = colorMap[colorSuffix] || '#007bff';

                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = autoLink;
                    card.setAttribute('data-keywords', keywords); 

                    card.innerHTML = `
                        <div class="book-icon">${getBookSVG(albumHex)}</div>
                        <div class="info">
                            <span class="title">${titleRu}</span>
                            <span class="code">${idCode}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                }
                
                const savedText = sessionStorage.getItem('lastSearchText');
                const savedDeep = (sessionStorage.getItem('lastSearchDeep') !== null) 
                                  ? sessionStorage.getItem('lastSearchDeep') === 'true' 
                                  : true;

                if (savedText || savedDeep) {
                    document.getElementById('searchBar').value = savedText || "";
                    document.getElementById('deepSearch').checked = savedDeep;
                    filterAlbums(); 
                }
            } catch (err) {
                document.getElementById('loader').innerText = "Ошибка доступа к CSV файлу.";
            }
        }

        function filterAlbums() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let isDeep = document.getElementById('deepSearch').checked;
            let cards = document.querySelectorAll('.card');

            // Сохраняем состояние поиска
            sessionStorage.setItem('lastSearchText', input);
            sessionStorage.setItem('lastSearchDeep', isDeep);

            cards.forEach(card => {
                let title = card.querySelector('.title').innerText.toLowerCase();
                let code = card.querySelector('.code').innerText.toLowerCase();
                let keywords = card.getAttribute('data-keywords').toLowerCase();

                // Проверяем: совпадает ли название/код ИЛИ (если включен deepSearch) ключевые слова
                let matchNormal = title.includes(input) || code.includes(input);
                let matchDeep = isDeep && keywords.includes(input);

                if (matchNormal || matchDeep) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
        
        window.onload = init;
    </script>
</body>
</html>
